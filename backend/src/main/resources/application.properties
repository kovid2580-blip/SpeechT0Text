spring.application.name=speech-to-text-api
server.port=8080

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/sttapp}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
app.jwt.expiration-ms=86400000
app.upload-dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
